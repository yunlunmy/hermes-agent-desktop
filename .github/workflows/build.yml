name: Build Hermes Agent Desktop

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Tauri CLI
      run: cargo install tauri-cli --locked
      
    - name: Setup Tauri Signing Key
      run: |
        $key = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
        $key | Out-File -FilePath "$env:RUNNER_TEMP\tauri-key.key" -Encoding utf8 -NoNewline
        Write-Host "Key file created at $env:RUNNER_TEMP\tauri-key.key"
      shell: pwsh
      
    - name: Build Tauri App
      run: cargo tauri build
      env:
        TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ runner.temp }}\tauri-key.key
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        
    - name: Upload MSI Installer
      uses: actions/upload-artifact@v4
      with:
        name: hermes-agent-desktop-windows-msi
        path: src-tauri/target/release/bundle/msi/*.msi
        
    - name: Upload NSIS Installer
      uses: actions/upload-artifact@v4
      with:
        name: hermes-agent-desktop-windows-setup
        path: src-tauri/target/release/bundle/nsis/*.exe
        
    - name: Upload Portable
      uses: actions/upload-artifact@v4
      with:
        name: hermes-agent-desktop-windows-portable
        path: src-tauri/target/release/hermes-agent-desktop.exe

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Tauri CLI
      run: cargo install tauri-cli --locked
      
    - name: Build Tauri App
      run: cargo tauri build
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: hermes-agent-desktop-macos-dmg
        path: src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
        
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Tauri CLI
      run: cargo install tauri-cli --locked
      
    - name: Build Tauri App
      run: cargo tauri build
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        
    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: hermes-agent-desktop-linux-appimage
        path: src-tauri/target/release/bundle/appimage/*.AppImage
        
    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: hermes-agent-desktop-linux-deb
        path: src-tauri/target/release/bundle/deb/*.deb
