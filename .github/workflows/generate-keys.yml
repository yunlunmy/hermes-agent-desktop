name: Generate Tauri Signing Keys

on:
  workflow_dispatch:

jobs:
  generate-keys:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        
    - name: Install Tauri CLI
      run: cargo install tauri-cli --locked
      
    - name: Generate Signing Keys
      run: |
        mkdir -p ~/.tauri
        # Generate keys with password
        cargo tauri signer generate --password "hermes2025" -w ~/.tauri/hermes-agent-desktop.key
        
        echo "=== PUBLIC KEY (Update tauri.conf.json updater.pubkey with this) ==="
        cat ~/.tauri/hermes-agent-desktop.key.pub
        echo ""
        echo "=== PRIVATE KEY (Add to GitHub Secrets as TAURI_SIGNING_PRIVATE_KEY) ==="
        cat ~/.tauri/hermes-agent-desktop.key
        echo ""
        echo "=== PASSWORD (Add to GitHub Secrets as TAURI_SIGNING_PRIVATE_KEY_PASSWORD) ==="
        echo "hermes2025"
